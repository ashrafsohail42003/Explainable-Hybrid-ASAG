# Phase 1 data configuration.
# Paths are resolved relative to the project root.

seed: 42

paths:
  data_root: data
  raw: data/raw
  interim: data/interim
  processed: data/processed
  external: data/external
  reports: reports
  figures: reports/figures
  checksums: data/raw/CHECKSUMS.txt

datasets:
  semeval:
    enabled: true
    name: semeval_2013_task7
    url_3way: https://github.com/myrosia/semeval-2013-task7/raw/main/semeval-3way.zip
    url_5way: https://github.com/myrosia/semeval-2013-task7/raw/main/semeval-5way.zip
    raw_subdir: semeval-2013-task7
    license: CC-BY-SA
    citation: |
      Dzikovska, M.O., Nielsen, R.D., Brew, C., Leacock, C., Giampiccolo, D., Bentivogli, L.,
      Clark, P., Dagan, I., & Dang, H.T. (2013). SemEval-2013 Task 7: The Joint Student
      Response Analysis and 8th Recognizing Textual Entailment Challenge.

  saf:
    enabled: true
    name: saf_communication_networks_english
    hf_id: Short-Answer-Feedback/saf_communication_networks_english
    raw_subdir: saf-comm-nets-en
    license: CC-BY-4.0
    citation: |
      Filighera, A., Parihar, S., Steuer, T., Meuser, T., & Ochs, S. (2022). Your Answer is
      Incorrect... Would you like to know why? Introducing a Bilingual Short Answer Feedback
      Dataset. ACL 2022.

  mohler:
    enabled: true
    name: mohler_2011
    # Primary source: Mohler subset extracted from the ASAG2024 unified benchmark.
    # The Kaggle dataset mubeenfurqanahmed/automatic-short-answer-grading-dataset
    # was reviewed and rejected (content is generic science Q&A, not Mohler 2011).
    asag2024_crosscheck_hf_id: Meyerger/ASAG2024
    raw_subdir: mohler-2011
    license: academic-research-use
    citation: |
      Mohler, M., Bunescu, R., & Mihalcea, R. (2011). Learning to Grade Short Answer
      Questions using Semantic Similarity Measures and Dependency Graph Alignments. ACL 2011.

  asap_sas:
    enabled: true
    name: asap_sas
    # The official Kaggle competition data is gated behind manual rule acceptance.
    # We instead use the freely redistributable AERA mirror (Li et al., Findings of
    # EMNLP 2023, CC-BY-NC-4.0), which republishes the science/biology prompts
    # (EssaySets 1, 2, 5, 6) with BOTH human-rater scores (Score1, Score2) and —
    # unlike the original Kaggle release — gold scores on the test split. This
    # covers 4 of the 10 ASAP-SAS prompts: a documented Phase 1 limitation. Each
    # split file also carries an extra ``llm_rationale`` column reserved for the
    # Phase 2 explainability study.
    mirror_hf_id: jiazhengli/AERA
    mirror_config: example            # example|complex|simple differ only in rationale style
    kaggle_competition: asap-sas      # original gated source, kept for provenance
    raw_subdir: asap-sas
    license: CC-BY-NC-4.0             # AERA mirror; original ASAP-SAS data (c) Hewlett Foundation
    citation: |
      Hewlett Foundation (2012). The Hewlett Foundation: Short Answer Scoring. Kaggle.
      Mirror: Li, J., Gui, L., Zhou, Y., West, D., Aloisi, C., & He, Y. (2023). Distilling
      ChatGPT for Explainable Automated Student Answer Assessment. Findings of EMNLP 2023.

  asag2024:
    enabled: true   # used as cross-check reference only, never merged into processed dataset
    name: asag2024_crosscheck
    hf_id: Meyerger/ASAG2024
    raw_subdir: asag2024
    license: per-source-license
    citation: |
      Meyer, G., Breuer, P., & Fürst, J. (2024). ASAG2024: A Combined Benchmark for Short
      Answer Grading. SIGCSE Virtual 2024.

  powergrading:
    enabled: true   # ranked #5 in the report; included for completeness
    name: powergrading_basu_2013
    url: https://download.microsoft.com/download/e/1/d/e1da2458-1af3-41c9-9515-7c9a8697e0cd/Powergrading-1.0-Corpus.zip
    raw_subdir: powergrading
    license: MSR-license-agreement
    citation: |
      Basu, S., Jacobs, C., & Vanderwende, L. (2013). Powergrading: a Clustering Approach
      to Amplify Human Effort for Short Answer Grading. Transactions of the ACL (TACL) 2013.

  mindreading:
    enabled: true   # MIND-CA corpus: 11,311 child responses (ages 7-14), ordinal 0/1/2
    name: mindreading_kovatchev_2020
    github_raw_base: https://raw.githubusercontent.com/venelink/mindreading-coling/main/Data/raw
    files:
      - SFQuestion_1_Text.xlsx
      - SFQuestion_2_Text.xlsx
      - SFQuestion_3_Text.xlsx
      - SFQuestion_4_Text.xlsx
      - SFQuestion_5_Text.xlsx
      - SFQuestion_6_Text.xlsx
      - SS_Brian_Text.xlsx
      - SS_Burglar_Text.xlsx
      - SS_Peabody_Text.xlsx
      - SS_Prisoner_Text.xlsx
      - SS_Simon_Text.xlsx
    raw_subdir: mindreading
    license: CC-BY-4.0
    citation: |
      Kovatchev, V., Smith, P., Lee, M., Grumley Traynor, I., Luque Aguilera, I., & Devine, R.
      (2020). "What is on your mind?" Automated Scoring of Mindreading in Childhood and Early
      Adolescence. COLING 2020, pp. 6217–6228.

preprocessing:
  encoder_view:
    normalize_unicode: NFKC
    collapse_whitespace: true
    lowercase: false
    remove_punctuation: false
    remove_stopwords: false
  feature_view:
    spacy_model: en_core_web_sm
    lemmatize: true
    lowercase: true
    remove_punctuation: true
    remove_stopwords: true
    preserve_negators:
      - "not"
      - "no"
      - "never"
      - "n't"
      - "without"
      - "neither"
      - "nor"
      - "none"
      - "cannot"
      - "can't"
      - "won't"
      - "don't"
      - "doesn't"
      - "didn't"
      - "isn't"
      - "wasn't"
      - "weren't"
      - "shouldn't"
      - "wouldn't"
      - "couldn't"
    # Explicit negation-scope cues (Phase 2A). When a negator is seen, the next
    # `window` kept tokens are prefixed with `neg_` (e.g. "does not forward" ->
    # "neg_forward"), stopping early at a clause boundary (punctuation / CCONJ).
    # Written to the separate `*_feat_neg` columns; `*_feat` stays plain so
    # Phase 2B can ablate marked vs. plain.
    negation_scope:
      enabled: true
      window: 4
      marker: prefix

splits:
  cv_k_folds: 5
  stratify_on: score  # bin score before stratifying for ordinal labels

validation:
  near_duplicate_jaccard_threshold: 0.95

# Phase 2B — feature engineering (late-fusion branches). Reference-dependent
# features emit NaN for datasets without a reference answer (asap_sas, mindreading).
features:
  enabled: true
  sbert_model: sentence-transformers/all-MiniLM-L6-v2
  branches:
    lexical: true
    tfidf: true
    negation: true
    entities: true     # spaCy NER overlap (NER re-enabled; parser stays off)
    semantic: true      # SBERT bi-encoder (cross-encoder deferred to Phase 2C)
    rubric: true
  tfidf:
    ngram_min: 1
    ngram_max: 2
    min_df: 2
  rubric:
    tau: 0.5            # concept "covered" when max student-similarity >= tau
  ner:
    spacy_model: en_core_web_sm
  semantic:
    batch_size: 64
    normalize: true
    save_interaction_vector: false   # 768-d |u-v|+u*v block -> separate parquet when true
    use_cache: true
